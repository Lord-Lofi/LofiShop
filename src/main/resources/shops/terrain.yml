# dirt / sand / gravel / cobblestone — buy $1/item | sell $0.125/item
#   buy [1,8,16,64] → $1/$8/$16/$64   |   sell [8,16,64] → $1/$2/$8
# sandstone — buy $4/item | sell $0.50/item
#   buy [1,8,16,64] → $4/$32/$64/$256 |   sell [2,16,64] → $1/$8/$32
# clay_ball — buy $16/item | sell $0.50/item
#   buy [1,4,8,16]  → $16/$64/$128/$256 | sell [2,8,16] → $1/$4/$8
# glass — buy $8/item | sell $0.25/item
#   buy [1,8,16,64] → $8/$64/$128/$512 |  sell [4,16,64] → $1/$4/$16
# ice — fixed stack of 64 (buy $13/64 | sell $5/64)
# snow_block — buy $4/item | sell $0.50/item
#   buy [1,8,16,64] → $4/$32/$64/$256 |   sell [2,16,64] → $1/$8/$32
# end_stone — buy $1/item | sell $0.25/item
#   buy [1,8,16,64] → $1/$8/$16/$64   |   sell [4,16,64] → $1/$4/$16
# white_wool — buy $32/item | sell $1/item
#   buy [1,4,8,16]  → $32/$128/$256/$512 | sell [1,4,8,16] → $1/$4/$8/$16
# stone / diorite / andesite / granite — buy $2/item | sell $0.25/item
#   buy [1,8,16,64] → $2/$16/$32/$128 |   sell [4,16,64] → $1/$4/$16
# deepslate — buy $3/item | sell $0.50/item
#   buy [1,8,16,64] → $3/$24/$48/$192 |   sell [2,16,64] → $1/$8/$32
# flint — buy $5/item | sell $1/item
#   buy [1,8,16,64] → $5/$40/$80/$320 |   sell [1,8,16,64] → $1/$8/$16/$64
# mud — buy $1/item | sell $0.125/item
#   buy [1,8,16,64] → $1/$8/$16/$64   |   sell [8,16,64] → $1/$2/$8
# tuff — buy $2/item | sell $0.25/item
#   buy [1,8,16,64] → $2/$16/$32/$128 |   sell [4,16,64] → $1/$4/$16
# packed_ice — buy $8/item | sell $1/item
#   buy [1,4,8,16]  → $8/$32/$64/$128 |   sell [1,4,8,16] → $1/$4/$8/$16
# blue_ice — buy $24/item | sell $3/item
#   buy [1,4,8,16]  → $24/$96/$192/$384 | sell [1,4,8,16] → $3/$12/$24/$48
# moss_block — buy $5/item | sell $1/item
#   buy [1,8,16,64] → $5/$40/$80/$320 |   sell [1,8,16,64] → $1/$8/$16/$64
# red_sand — buy $1/item | sell $0.125/item
#   buy [1,8,16,64] → $1/$8/$16/$64   |   sell [8,16,64] → $1/$2/$8

