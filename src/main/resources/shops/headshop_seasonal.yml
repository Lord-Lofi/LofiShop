shop-name: "<gradient:#f97316:#a78bfa>Seasonal Head Shop</gradient>"
title: "<dark_gray>[ <gradient:#f97316:#a78bfa>Seasonal Head Shop</gradient> <dark_gray>]"
rows: 6
admin-shop: true
open-permission: ""

filler:
  material: ORANGE_STAINED_GLASS_PANE
  name: " "

# 6 seasonal crates — centered in rows 3 and 4
layout:
  - "F F F F F F F F F"
  - "F F F F F F F F F"
  - "F F F a b c F F F"
  - "F F F d e f F F F"
  - "F F F F F F F F F"
  - "F F F F F F F F F"

