    give-item: false
    item:
      material: CARVED_PUMPKIN
      name: "<gradient:#f97316:#7c3aed>✦ Halloween Crate ✦</gradient>"
      lore:
        - "<gray>Spooky heads for the Halloween season."
        - "<dark_orange>Available: Oct 1 – Nov 15"
        - ""
        - "<yellow>Left-click to purchase"
        - "<yellow>Price: <gold>{buy_price}"
    buy-price:
      - type: vault
        amount: 750.0
    amount: 1
    limits:
      personal-buy: -1
      personal-sell: -1
      global-buy: -1
      global-sell: -1
      reset: NEVER
    actions:
      buy:
        - "[console] lofibox give halloween {player} 1"
        - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP"

